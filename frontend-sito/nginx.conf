# ══════════════════════════════════════════════════════
#  AniStream — Nginx Config
#  - Serve SPA React (React Router fallback)
#  - Streaming video con range requests (seek funzionante)
#  - Sottotitoli .vtt / .srt
#  - Gzip compression
#  - Headers di sicurezza
# ══════════════════════════════════════════════════════

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip ────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/rss+xml application/atom+xml
        image/svg+xml;
    gzip_min_length 1024;

    # ── Charset ─────────────────────────────────────────
    charset utf-8;

    # ── Health check ────────────────────────────────────
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ── Assets statici: cache 1 anno ────────────────────
    # Vite genera hash nei filename → safe per immutable cache
    location ~* \.(js|css|woff2?|ttf|eot|ico|webp|png|jpg|jpeg|gif|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
        access_log off;
    }

    # ── Avatar (nella cartella /public/avatars) ──────────
    location /avatars/ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── Video Anime (montato da volume Docker) ───────────
    # URL:  /anime/<NomeAnime>/<Stagione>/<file.mp4>
    # Path: /media/anime/<NomeAnime>/<Stagione>/<file.mp4>
    location /anime/ {
        alias /media/anime/;

        # RANGE REQUESTS — fondamentale per seek video nel player
        add_header Accept-Ranges bytes;

        # CORS headers per stesso dominio/rete locale
        add_header Access-Control-Allow-Origin "*";
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
        add_header Access-Control-Allow-Headers "Range, Content-Range";
        add_header Access-Control-Expose-Headers "Content-Length, Content-Range, Accept-Ranges";

        # Gestisci preflight OPTIONS
        if ($request_method = OPTIONS) {
            return 204;
        }

        # Cache video (7 giorni)
        expires 7d;
        add_header Cache-Control "public";

        # MIME types video
        types {
            video/mp4         mp4;
            video/webm        webm;
            video/x-matroska  mkv;
            text/vtt          vtt;
            text/plain        srt;
        }

        # Disabilita buffer per streaming fluido
        proxy_buffering off;

        # Non loggare ogni chunk video (spam nei log)
        access_log off;
    }

    # ── Sottotitoli VTT ─────────────────────────────────
    location ~* \.vtt$ {
        add_header Content-Type "text/vtt; charset=utf-8";
        add_header Access-Control-Allow-Origin "*";
        expires 7d;
    }

    # ── Sottotitoli SRT ─────────────────────────────────
    location ~* \.srt$ {
        add_header Content-Type "text/plain; charset=utf-8";
        add_header Access-Control-Allow-Origin "*";
        expires 7d;
    }

    # ── SPA Fallback (React Router) ──────────────────────
    # Qualsiasi route non trovata → index.html
    # Nginx gestisce i file statici direttamente, il resto va a React
    location / {
        try_files $uri $uri/ /index.html;

        # Cache HTML breve (la app si aggiorna)
        location = /index.html {
            add_header Cache-Control "no-cache, must-revalidate";
            expires 0;
        }
    }

    # ── Security Headers ────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ── Error pages ─────────────────────────────────────
    error_page 404 /index.html;
    error_page 500 502 503 504 /index.html;
}
